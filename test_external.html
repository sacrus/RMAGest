<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test External Widget</title>
</head>
<body style="background-color: #1e293b; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <!-- Paste Widget Code Here -->
    <div class="rmagest-search-widget" style="font-family: system-ui, -apple-system, sans-serif; max-width: 400px; width: 100%; box-sizing: border-box; padding: 24px; border-radius: 14px; background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); color: #f3f4f6;">
        <form action="http://localhost/RMA/index.php" method="get" target="_blank">
            <input type="hidden" name="route" value="client/rma-view">
            <div style="margin-bottom: 16px; box-sizing: border-box;">
                <label style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Pesquisar Estado de Reparação</label>
                <div style="position: relative; display: flex; align-items: center; box-sizing: border-box;">
                    <span style="position: absolute; left: 14px; color: #888; pointer-events: none; font-size: 1rem;">🔍</span>
                    <input type="text" name="rma" placeholder="Nº RMA (Ex: RMA-2026-12345)" required style="width: 100%; padding: 10px 14px 10px 40px; border-radius: 8px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.15s ease; box-sizing: border-box; background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); color: #f3f4f6;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor=''">
                </div>
            </div>
            <button type="submit" style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #6366f1; color: #ffffff; font-weight: 600; font-size: 0.95rem; font-family: inherit; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 12px #6366f140; box-sizing: border-box;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                Procurar
            </button>
        </form>
    </div>
</body>
</html>
